name: dimap-geocode

services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dimap_geocode}
      POSTGRES_USER: ${POSTGRES_USER:-dimap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dimap}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dimap} -d ${POSTGRES_DB:-dimap_geocode}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    # migrate só roda depois que o projeto Django (manage.py/config) existir.
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      # Consumidos pelo config/settings.py (via Pydantic Settings, ver CLAUDE.md §10.3).
      POSTGRES_DB: ${POSTGRES_DB:-dimap_geocode}
      POSTGRES_USER: ${POSTGRES_USER:-dimap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dimap}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-insecure-secret-key-change-me}
    volumes:
      # Bind mount do código para hot-reload; o venv vive em /opt/venv (intacto).
      - .:/app
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
